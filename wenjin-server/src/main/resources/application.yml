server:
  port: 8080                      # 后端服务端口，前端开发时通过 Vite proxy 转发到此
  servlet:
    encoding:
      charset: UTF-8
      force: true

spring:
  application:
    name: wenjin-server
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    # 数据库名 wenjin，请先用 schema.sql 建库建表（见根目录 README）
    url: jdbc:mysql://localhost:3306/wenjin?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USER:root}     # 可用环境变量 DB_USER 覆盖
    password: ${DB_PASSWORD:root} # 可用环境变量 DB_PASSWORD 覆盖
  # 不让应用自动执行 DDL：schema.sql 由开发者手动执行一次，避免每次启动清库（详见 README）
  sql:
    init:
      mode: never
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 12MB

# MyBatis-Plus 配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true          # 数据库下划线 <-> Java 驼峰自动映射
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl  # 开发期打印 SQL，便于排查
  global-config:
    db-config:
      id-type: auto                              # 主键自增，与 node_code 业务编码分离
      logic-delete-field: null

# 演示用固定身份（本阶段不做登录与权限）
wenjin:
  demo:
    teacher-id: 1                                # 写死的演示教师，导入图谱时作为课程创建者
    course-id: 1                                 # 写死的演示课程，AI 出题时的目标课程
  seed:
    enabled: false                               # 演示数据播种开关，默认关闭；仅本地演示前临时置 true（绝不在测试/生产开启）
  ai:                                            # AI 出题/标注（OpenAI 兼容，默认 DeepSeek）
    enabled: ${WENJIN_AI_ENABLED:true}
    base-url: ${WENJIN_AI_BASE_URL:https://api.deepseek.com}
    api-key: ${WENJIN_AI_API_KEY:}
    model: ${WENJIN_AI_MODEL:deepseek-v4-pro}
    temperature: 0.4
    vision:                                       # 多模态仅识图,可换更强模型;key 经环境变量注入勿硬编码
      enabled: ${WENJIN_AI_VISION_ENABLED:true}
      base-url: ${WENJIN_AI_VISION_BASE_URL:https://open.bigmodel.cn/api/paas/v4}
      api-key: ${WENJIN_AI_VISION_API_KEY:}
      model: ${WENJIN_AI_VISION_MODEL:glm-5v-turbo}
  diagnostic:                                    # 入口诊断组卷（T6）
    paper-size: 25                               # 诊断试卷目标题数（分层抽样上限）
  mastery:                                       # 掌握度计算（阶段三 EWMA）
    alpha: 0.3                                   # EWMA 平滑系数基准
    mastered-threshold: 75                       # 掌握度 ≥ 此值判为已掌握
    weak-threshold: 40                           # 掌握度 ≥ 此值判为薄弱，否则未学
  auth:                                          # 令牌认证配置
    secret: ${WENJIN_AUTH_SECRET:dev-secret-change-me-in-prod}
    ttl-seconds: 604800                          # 令牌有效期 7 天

logging:
  level:
    com.wenjin: debug
